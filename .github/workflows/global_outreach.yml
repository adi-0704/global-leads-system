name: Global Lead Outreach Campaign

on:
  schedule:
    # Runs daily at 09:00 UTC = 2:30 PM IST
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only? (true = log, false = send real emails)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'Max Google Maps results per search'
        required: false
        default: '150'
      target:
        description: 'Target qualified leads today (default: 400)'
        required: false
        default: '400'

permissions:
  contents: write

jobs:
  global-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'global-outreach/requirements.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r global-outreach/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Global Scraper & Outreach
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
          IMAP_HOST:     ${{ secrets.IMAP_HOST }}
          IMAP_USER:     ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        run: |
          echo "======================================"
          echo "  GLOBAL OUTREACH — 2:30 PM IST"
          echo "  Target: 50 emails/day"
          echo "  Follow-ups: max 20 | New: min 30"
          echo "======================================"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            python global-outreach/scrape_and_outreach.py --target 400 --limit 150 --max-iterations 100
          else
            ARGS="--limit ${{ github.event.inputs.limit || '150' }}"
            [ "${{ github.event.inputs.dry_run }}" = "true" ] && ARGS="$ARGS --dry-run"
            TARGET="${{ github.event.inputs.target || '400' }}"
            [ "$TARGET" != "0" ] && ARGS="$ARGS --target $TARGET"
            echo "Args: $ARGS"
            eval python global-outreach/scrape_and_outreach.py $ARGS
          fi

      - name: Export data.json
        if: always()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
        run: python global-outreach/generate_data_json.py

      - name: Commit Results
        if: always()
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add global-outreach/leads.db global-outreach/data.json global-outreach/sender_email.txt || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: global outreach sync [skip ci]"
            git push
          fi
