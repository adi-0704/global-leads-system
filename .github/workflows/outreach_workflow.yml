name: Global Lead Outreach Campaign

on:
  schedule:
    # Runs daily at 09:00 UTC (2:30 PM IST)
    - cron: '0 9 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry-run only? (true = log emails, false = send real emails)'
        required: false
        default: 'true'
        type: choice
        options: ['true', 'false']
      limit:
        description: 'Max Google Maps results per single search'
        required: false
        default: '25'
      target:
        description: 'Target Old Website leads to collect today (0 = single run, 60 = keep looping)'
        required: false
        default: '60'
      city:
        description: 'City to scrape (blank = random from config)'
        required: false
        default: ''
      keyword:
        description: 'Keyword override (blank = random from config)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  run-outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'global-outreach/requirements.txt'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r global-outreach/requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run Scraper & Outreach Campaign
        env:
          SMTP_HOST:     ${{ secrets.SMTP_HOST }}
          SMTP_PORT:     ${{ secrets.SMTP_PORT }}
          SMTP_USER:     ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM:     ${{ secrets.SMTP_FROM }}
          IMAP_HOST:     ${{ secrets.IMAP_HOST }}
          IMAP_USER:     ${{ secrets.IMAP_USER }}
          IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
        run: |
          # Scheduled runs: target mode — keep scraping until 60 Old Website leads collected
          # Manual runs: use whatever inputs were selected in the UI
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Running in SCHEDULED TARGET mode (target: 60 Old Website leads)"
            python global-outreach/scrape_and_outreach.py --target 60 --limit 25 --max-iterations 20
          else
            # Manual workflow_dispatch run
            ARGS="--limit ${{ github.event.inputs.limit || '25' }}"
            [ "${{ github.event.inputs.dry_run }}"  = "true"  ] && ARGS="$ARGS --dry-run"
            [ -n "${{ github.event.inputs.city }}"             ] && ARGS="$ARGS --city '${{ github.event.inputs.city }}'"
            [ -n "${{ github.event.inputs.keyword }}"          ] && ARGS="$ARGS --keyword '${{ github.event.inputs.keyword }}'"
            [ "${{ github.event.inputs.target || '0' }}" != "0" ] && ARGS="$ARGS --target ${{ github.event.inputs.target || '0' }}"
            echo "Running manual run with args: $ARGS"
            eval python global-outreach/scrape_and_outreach.py $ARGS
          fi

      - name: Export data.json for GitHub Pages Dashboard
        run: |
          python global-outreach/generate_data_json.py

      - name: Commit & Push Updated Database + Dashboard Data
        run: |
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add global-outreach/leads.db global-outreach/data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-sync leads + dashboard data [skip ci]"
            git push
          fi
